<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Dirección del Mouse</title>
  <style>
    body {
      font-family: monospace;
      background: #111;
      color: #0f0;
      padding: 20px;
    }
    #output {
      font-size: 24px;
      margin-top: 20px;
    }
  </style>
</head>
<body>

<h2>Detector de dirección</h2>
<p>Mové el mouse 👇</p>

<div id="output">Esperando movimiento...</div>

<script>
let lastX = null;
let lastY = null;
let ultimaDireccion = "";

const output = document.getElementById("output");

document.addEventListener("mousemove", (e) => {
  if (lastX === null || lastY === null) {
    lastX = e.clientX;
    lastY = e.clientY;
    return;
  }

  const dx = e.clientX - lastX;
  const dy = e.clientY - lastY;

  let direccion = "";

  if (Math.abs(dx) > Math.abs(dy)) {
    // Movimiento horizontal
    if (dx > 0) direccion = "derecha";
    else if (dx < 0) direccion = "izquierda";
  } else {
    // Movimiento vertical
    if (dy > 0) direccion = "abajo";
    else if (dy < 0) direccion = "arriba";
  }

  // Evita repetir lo mismo constantemente
  if (direccion && direccion !== ultimaDireccion) {
    output.textContent = direccion.toUpperCase();
    console.log(direccion);
    ultimaDireccion = direccion;
  }

  lastX = e.clientX;
  lastY = e.clientY;
});
</script>

</body>
</html>
