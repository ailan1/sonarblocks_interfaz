<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button id="btn">Hablar</button>

<script>
  const btn = document.getElementById("btn");

  btn.onclick = () => {
    const msg = new SpeechSynthesisUtterance("Hola mundo prueba final");

    msg.onstart = () => console.log("▶️ start");
    msg.onend = () => console.log("⏹ end");
    msg.onerror = (e) => console.error("❌ error:", e);

    speechSynthesis.speak(msg);
  };
</script>
    
</body>
</html>
