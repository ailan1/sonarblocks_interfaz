name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

env:
  # Esto soluciona la advertencia de Node.js 20
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      # Usamos v5 para que sea compatible con Node 24
      - uses: actions/checkout@v5
        with:
          submodules: true
          lfs: false
          persist-credentials: false

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_LEMON_OCEAN_05194B91E }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          
          # --- CONFIGURACIÓN DE RUTAS ---
          app_location: "/"       # Donde está tu package.json
          api_location: ""        # Déjalo vacío si no usas Azure Functions
          
          # IMPORTANTE: 
          # 1. Si usas Vite, cambia "build" por "dist" abajo.
          # 2. Si usas React normal (CRA), deja "build".
          output_location: "build" 
          
          # Dejamos que Azure haga el build internamente para evitar errores de ruta
          skip_app_build: false 

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_LEMON_OCEAN_05194B91E }}
          action: "close"